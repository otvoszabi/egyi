<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Központi Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 900px;
            width: 90%;
            padding: 2rem 0;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: -webkit-linear-gradient(#4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 1.2rem;
            color: #b0c4de;
            margin-bottom: 4rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2.5rem;
            padding: 0 1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 20px 50px 0 rgba(79, 172, 254, 0.3);
        }

        .card:hover::before {
            opacity: 1;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .card:hover .icon {
            transform: scale(1.1);
        }

        .card h2 {
            font-size: 1.6rem;
            margin: 0;
            color: #e0f2fe;
            font-weight: 600;
        }

        /* Responsive design kis kijelzőkre */
        @media (max-width: 600px) {
            header h1 {
                font-size: 2.5rem;
            }
            .card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Alkalmazások</h1>
            <p>Válaszd ki az indítani kívánt modult</p>
        </header>

        <div class="card-grid">
            <!-- Jelenlétek Kártya -->
            <a href="presentations/pres.html" class="card">
                <div class="icon">✅</div>
                <h2>Jelenlétek</h2>
            </a>

            <!-- Órarend Kártya -->
            <a href="timetable/timetable.html" class="card">
                <div class="icon">📅</div>
                <h2>Órarend</h2>
            </a>
        </div>
    </div>

</body>
</html>
