<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Központi Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            /* Teljesen sötét háttér, középen egy finom mélykék ragyogással */
            background-color: #0e0e0e;
            background-image: radial-gradient(circle at 50% 45%, rgba(20, 35, 75, 0.7) 0%, rgba(14, 14, 14, 1) 60%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e3e3e3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            z-index: 1;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 2.5rem;
            color: #f1f3f4;
            letter-spacing: 0.5px;
        }

        .card-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
        }

        /* Minimalista, keresősáv-stílusú kártyák */
        .card {
            background: #1e1f22;
            border: 1px solid #333538;
            border-radius: 50px; /* Kerekített, kapszula forma */
            padding: 1rem 1.8rem;
            text-decoration: none;
            color: #e3e3e3;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card:hover {
            background: #2a2b2f;
            border-color: #55585b;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 1.2rem;
        }

        .card h2 {
            font-size: 1.05rem;
            font-weight: 400;
            margin: 0;
        }

        /* Reszponzív dizájn telefonokra */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6rem;
            }
            .card-grid {
                flex-direction: column;
                align-items: center;
            }
            .card {
                width: 80%;
                justify-content: center;
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Mire összpontosítsunk?</h1>
        </header>

        <div class="card-grid">
            <a href="presentations/pres.html" class="card">
                <span class="icon">✅</span>
                <h2>Jelenlétek</h2>
            </a>

            <a href="timetable/timetable.html" class="card">
                <span class="icon">📅</span>
                <h2>Órarend</h2>
            </a>

            <a href="https://portal-academic.umfst.ro/login" class="card" target="_blank">
                <span class="icon">🎓</span>
                <h2>Jegyek</h2>
            </a>

            <a href="https://osmosis.org" class="card" target="_blank">
                <span class="icon">🧠</span>
                <h2>Osmosis</h2>
            </a>

            <a href="https://umfst-garzi.web.app/login" class="card" target="_blank">
                <span class="icon">➕</span>
                <h2>Vigilia</h2>
            </a>

            <a href="https://outlook.office.com/mail/" class="card" target="_blank">
                <span class="icon">✉️</span>
                <h2>Email</h2>
            </a>
        </div>
    </div>

</body>
</html>
