<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Központi Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        /* Teljesen fekete háttér a böngészőnek */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #000000; 
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* A "kék tér", ami összefogja a tartalmat */
        .content-area {
            background: linear-gradient(135deg, #051622, #0a2540);
            border-radius: 30px;
            padding: 3.5rem 2rem;
            max-width: 1000px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 119, 182, 0.3);
            border: 1px solid rgba(0, 119, 182, 0.2);
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #e0f2fe;
        }

        header p {
            font-size: 1.1rem;
            color: #8da9c4;
            margin-bottom: 3.5rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            padding: 0 1rem;
        }

        /* Minimalista kártyák */
        .card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: #4facfe;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.2);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }

        .card:hover .icon {
            transform: scale(1.1);
        }

        .card h2 {
            font-size: 1.3rem;
            margin: 0;
            color: #e0f2fe;
            font-weight: 600;
        }

        /* Reszponzív dizájn telefonokra */
        @media (max-width: 600px) {
            .content-area {
                padding: 2rem 1rem;
                border-radius: 20px;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .card-grid {
                gap: 1.5rem;
            }
            .card {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="content-area">
        <header>
            <h1>Alkalmazások</h1>
            <p>Válaszd ki az indítani kívánt modult</p>
        </header>

        <div class="card-grid">
            <a href="presentations/pres.html" class="card">
                <div class="icon">✅</div>
                <h2>Jelenlétek</h2>
            </a>

            <a href="timetable/timetable.html" class="card">
                <div class="icon">📅</div>
                <h2>Órarend</h2>
            </a>

            <a href="https://portal-academic.umfst.ro/login" class="card" target="_blank">
                <div class="icon">🎓</div>
                <h2>Jegyek</h2>
            </a>

            <a href="https://osmosis.org" class="card" target="_blank">
                <div class="icon">🧠</div>
                <h2>Osmosis</h2>
            </a>

            <a href="https://umfst-garzi.web.app/login" class="card" target="_blank">
                <div class="icon">➕</div>
                <h2>Vigilia</h2>
            </a>

            <a href="https://outlook.office.com/mail/" class="card" target="_blank">
                <div class="icon">✉️</div>
                <h2>Email</h2>
            </a>
        </div>
    </div>

</body>
</html>
