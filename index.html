<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Központi Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #0e0e0e;
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 35, 75, 0.7) 0%, rgba(14, 14, 14, 1) 60%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e3e3e3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 3rem 2rem;
            box-sizing: border-box;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            width: 100%;
            max-width: 1100px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin: 0 0 1rem 0;
            color: #f1f3f4;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .top-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* Módosítva 3-ról 4-re az új kártya miatt */
            gap: 1.5rem;
            width: 100%;
        }

        .bottom-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: #1e1f22;
            border: 1px solid #333538;
            border-radius: 20px;
            text-decoration: none;
            color: #e3e3e3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .card:hover {
            background: rgba(25, 45, 75, 0.6);
            border-color: rgba(79, 172, 254, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.15);
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* SVG ikon stílusa */
        .icon svg {
            width: 30px;
            height: 30px;
            fill: #e3e3e3;
        }

        .card.large {
            padding: 2.2rem 2rem;
            gap: 20px;
            justify-content: center;
        }

        .card.large .icon {
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .card.large h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .card.medium {
            padding: 1.5rem 2rem;
            gap: 20px;
            width: 300px;
            justify-content: flex-start;
        }

        .card.medium .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        .card.medium h2 {
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: 0.5px;
        }

        @media (max-width: 950px) {
            .top-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 650px) {
            header h1 {
                font-size: 2rem;
            }
            .top-row {
                grid-template-columns: 1fr;
            }
            .card.medium {
                width: 100%;
                max-width: 100%;
                justify-content: center;
            }
            .card.large {
                justify-content: flex-start;
                padding: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="layout-wrapper">
            
            <header>
                <h1>Hub</h1>
            </header>
            
            <div class="top-row">
                <a href="https://drive.google.com/drive/u/0/folders/1tBa0dpio8K0IZI8FMz_psUheAzWeXCe9" class="card large" target="_blank">
                    <span class="icon">
                        <img src="https://ssl.gstatic.com/docs/doclist/images/drive_favicon_2026_32dp.png" alt="Google Drive Logó">
                    </span>
                    <h2>Google Drive</h2>
                </a>

                <!-- Új NotebookLM kártya -->
                <a href="https://notebooklm.google.com/" class="card large" target="_blank">
                    <span class="icon">
                        <img src="https://notebooklm.google.com/favicon.ico" alt="NotebookLM Logó" style="border-radius: 4px;">
                    </span>
                    <h2>NotebookLM</h2>
                </a>

                <a href="timetable/timetable.html" class="card large" target="_blank">
                    <span class="icon">📅</span>
                    <h2>Órarend</h2>
                </a>

                <a href="presentations/pres.html" class="card large" target="_blank">
                    <span class="icon">✅</span>
                    <h2>Jelenlétek</h2>
                </a>
            </div>

            <div class="bottom-row">
                <a href="https://portal-academic.umfst.ro/login" class="card medium" target="_blank">
                    <span class="icon">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 12h2v5H7zm4-3h2v8h-2zm4 1h2v7h-2z"/></svg>
                    </span>
                    <h2>Solaris</h2>
                </a>

                <a href="https://osmosis.org" class="card medium" target="_blank">
                    <span class="icon">
                        <img src="https://www.osmosis.org/wp-content/uploads/sites/18/2026/01/cropped-favicon-1.png?w=192" alt="Osmosis Logó">
                    </span>
                    <h2>Osmosis</h2>
                </a>

                <a href="https://umfst-garzi.web.app/login" class="card medium" target="_blank">
                    <span class="icon">
                        <img src="https://umfst-garzi.web.app/vite.svg" alt="Vigilia Logó">
                    </span>
                    <h2>Vigilia</h2>
                </a>

                <a href="https://fizioms.ro" class="card medium" target="_blank">
                    <span class="icon">🧬</span>
                    <h2>Fizio</h2>
                </a>

                <a href="https://apw.umfst.ro/SlideCenter/Login" class="card medium" target="_blank">
                    <span class="icon">🔬</span>
                    <h2>Morfo</h2>
                </a>

                <a href="https://outlook.office.com/mail/" class="card medium" target="_blank">
                    <span class="icon">✉️</span>
                    <h2>Email</h2>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
