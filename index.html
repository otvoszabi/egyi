<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Központi Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #0e0e0e;
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 35, 75, 0.7) 0%, rgba(14, 14, 14, 1) 60%);
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #e3e3e3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 2rem;
            box-sizing: border-box;
        }

        .card-grid {
            display: flex;
            flex-direction: column; /* Egy oszlopba rendezés */
            align-items: center;
            gap: 1.2rem;
            width: 100%;
        }

        /* Szélesebb, oszlopos kártyák */
        .card {
            background: #1e1f22;
            border: 1px solid #333538;
            border-radius: 20px;
            padding: 1.2rem 2rem;
            text-decoration: none;
            color: #e3e3e3;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 350px; /* A kártyák maximális szélessége */
            box-sizing: border-box;
        }

        .card:hover {
            background: #2a2b2f;
            border-color: #55585b;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px; /* Fix szélesség az ikonoknak, hogy a szöveg szépen egy vonalban maradjon */
        }

        .card h2 {
            font-size: 1.1rem;
            font-weight: 400;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Reszponzív dizájn telefonokra */
        @media (max-width: 400px) {
            .card {
                max-width: 100%;
                padding: 1rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-grid">
            <a href="presentations/pres.html" class="card">
                <span class="icon">✅</span>
                <h2>Jelenlétek</h2>
            </a>

            <a href="timetable/timetable.html" class="card">
                <span class="icon">📅</span>
                <h2>Órarend</h2>
            </a>

            <a href="https://portal-academic.umfst.ro/login" class="card" target="_blank">
                <span class="icon">🎓</span>
                <h2>Jegyek</h2>
            </a>

            <a href="https://osmosis.org" class="card" target="_blank">
                <span class="icon">🧠</span>
                <h2>Osmosis</h2>
            </a>

            <a href="https://umfst-garzi.web.app/login" class="card" target="_blank">
                <span class="icon">➕</span>
                <h2>Vigilia</h2>
            </a>

            <a href="https://fizioms.ro" class="card" target="_blank">
                <span class="icon">🧬</span>
                <h2>Fizio</h2>
            </a>

            <a href="https://outlook.office.com/mail/" class="card" target="_blank">
                <span class="icon">✉️</span>
                <h2>Email</h2>
            </a>
        </div>
    </div>

</body>
</html>
